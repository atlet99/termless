packages:
  - 'apps/*'
  - 'packages/*'

catalog:
  typescript: ^5.8.3
  eslint: ^10.4.0
  typescript-eslint: ^8.59.4
  '@typescript-eslint/eslint-plugin': ^8.59.4
  '@typescript-eslint/parser': ^8.59.4
  '@types/node': ^24.0.0
  zod: ^4.4.3
  fastify: ^5.8.5
  pino: ^9.6.0
  prom-client: ^15.1.0
  vitest: ^3.2.0

allowBuilds:
  '@biomejs/biome': true
  '@prisma/engines': true
  argon2: true
  core-js: true
  esbuild: true
  lefthook: true
  prisma: true
  protobufjs: true
  unrs-resolver: true

peerDependencyRules:
  allowAny:
    - eslint-plugin-react
    - eslint-plugin-jsx-a11y
    - eslint-plugin-vitest
