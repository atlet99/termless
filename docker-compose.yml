services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - workspace:/workspace
      - /etc/sudoers.d:/etc/sudoers.d:ro
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - termless

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    restart: unless-stopped
    networks:
      - termless

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - termless

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: termless
      POSTGRES_USER: termless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-termless}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U termless"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - termless

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-termless}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-termless}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - termless

volumes:
  workspace:
    driver: local
  pgdata:
    driver: local
  redisdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  termless:
    driver: bridge
